<!DOCTYPE html>
<html>
<head>
  <title>Razorpay Bill Payment Test</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <h2>Bill Payment Test</h2>
  <button id="payBtn">Pay Bill</button>
  <pre id="result"></pre>

  <script>
    const razorpayKey = "rzp_test_T4YmPqgqoLZlUp";
    const razorpayOrderId = "order_T5S8PxrEJNpxsQ";
    const billingId = 10;
    const customerToken = "21c55f24ddfbec84d8c8d87d9661ff7b4620e035";

    document.getElementById("payBtn").onclick = function () {
      const options = {
        key: razorpayKey,
        amount: 70000,
        currency: "INR",
        name: "Social Monkey",
        description: "Final Bill Payment",
        order_id: razorpayOrderId,
        handler: function (response) {
          document.getElementById("result").textContent =
            JSON.stringify(response, null, 2);
          
          // Auto confirm after payment
          fetch("https://api.social-monkey.com/user_management/payment/confirm-bill/", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Token " + customerToken
            },
            body: JSON.stringify({
              razorpay_order_id: response.razorpay_order_id,
              razorpay_payment_id: response.razorpay_payment_id,
              razorpay_signature: response.razorpay_signature,
              billing_id: billingId
            })
          })
          .then(r => r.json())
          .then(data => {
            document.getElementById("result").textContent += "\n\nConfirm Response:\n" + JSON.stringify(data, null, 2);
          });
        },
        theme: { color: "#3399cc" }
      };

      const rzp = new Razorpay(options);
      rzp.open();
    };
  </script>
</body>
</html>
